<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../icon.png">
    <link rel="stylesheet" href="./style.css">
    <title>CRXZY // JUWAD MOVIE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-zinc-800 selection:text-white">
    <header class="w-full bg-zinc-950 border-b border-zinc-800 px-4 py-3 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-50">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="changeCategory('trending')">
            <a href="../crxzy" class="font-bold text-white uppercase hover:text-zinc-400 transition">CRXZY</a>
            <h1 class="text-sm font-bold tracking-widest uppercase text-white">// JUWAD MOVIE</h1>
        </div>
        <div class="flex-1 max-w-md mx-2 relative">
            <span class="absolute left-3 top-2.5 text-zinc-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </span>
            <input type="text" id="searchInput" placeholder="SEARCH" 
                   class="w-full bg-zinc-900 text-xs text-zinc-100 pl-9 pr-4 py-2 rounded-none border border-zinc-800 focus:outline-none focus:border-zinc-500 transition font-mono uppercase tracking-wider placeholder-zinc-600">
            <div id="searchDropdown" class="absolute left-0 right-0 top-full mt-1 bg-zinc-950 border border-zinc-800 rounded-none shadow-2xl max-h-96 overflow-y-auto hidden z-50">
                </div>
        </div>
        <div class="w-12"></div> </header>
    <div class="flex flex-1 flex-col md:flex-row w-full">
        <aside class="w-full md:w-64 bg-zinc-950 border-b md:border-b-0 md:border-r border-zinc-800 p-4 font-mono text-xs flex flex-col sm:flex-row md:flex-col justify-between items-start sm:items-center md:items-start gap-4 sticky top-[69px] md:h-[calc(100vh-69px)] md:overflow-y-auto z-40">
            <div class="flex flex-row md:flex-col gap-2 w-full overflow-x-auto md:overflow-x-visible pb-2 md:pb-0 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
                <button onclick="changeCategory('trending')" id="btn-trending" class="filter-btn text-left px-3 py-2 border border-zinc-700 bg-zinc-900 text-white font-bold uppercase transition cursor-pointer whitespace-nowrap">
                    TRENDING NOW
                </button>
                <button onclick="changeCategory('top_rated')" id="btn-top_rated" class="filter-btn text-left px-3 py-2 border border-zinc-900 text-zinc-400 hover:text-white hover:border-zinc-700 transition uppercase cursor-pointer whitespace-nowrap">
                    TOP RATED
                </button>
                <button onclick="changeCategory('movie')" id="btn-movie" class="filter-btn text-left px-3 py-2 border border-zinc-900 text-zinc-400 hover:text-white hover:border-zinc-700 transition uppercase cursor-pointer whitespace-nowrap">
                    MOVIES
                </button>
                <button onclick="changeCategory('tv')" id="btn-tv" class="filter-btn text-left px-3 py-2 border border-zinc-900 text-zinc-400 hover:text-white hover:border-zinc-700 transition uppercase cursor-pointer whitespace-nowrap">
                    TV AND ANIME
                </button>
            </div>
            <div class="pt-4 border-t border-zinc-900 w-full sm:w-auto md:w-full flex justify-start sm:justify-end md:justify-start">
                <a href="https://www.tiktok.com/@._.crxzy" target="_blank" rel="noopener noreferrer" 
                   class="group flex items-center space-x-2 bg-zinc-950 border border-zinc-900 hover:border-zinc-700 p-2 text-zinc-400 hover:text-white transition-all duration-300 overflow-hidden rounded-none w-max max-w-full">
                    <svg class="h-5 w-5 fill-white flex-shrink-0" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16.656 1.029c1.637-0.025 3.262-0.012 4.886-0.025 0.054 2.031 0.878 3.859 2.189 5.213l-0.002-0.002c1.411 1.271 3.247 2.095 5.271 2.235l0.028 0.002v5.036c-1.912-0.048-3.71-0.489-5.331-1.247l0.082 0.034c-0.784-0.377-1.447-0.764-2.077-1.196l0.052 0.034c-0.012 3.649 0.012 7.298-0.025 10.934-0.103 1.853-0.719 3.543-1.707 4.954l0.020-0.031c-1.652 2.366-4.328 3.919-7.371 4.011l-0.014 0c-0.123 0.006-0.268 0.009-0.414 0.009-1.73 0-3.347-0.482-4.725-1.319l0.040 0.023c-2.508-1.509-4.238-4.091-4.558-7.094l-0.004-0.041c-0.025-0.625-0.037-1.25-0.012-1.862 0.49-4.779 4.494-8.476 9.361-8.476 0.547 0 1.083 0.047 1.604 0.136l-0.056-0.008c0.025 1.849-0.050 3.699-0.050 5.548-0.423-0.153-0.911-0.242-1.42-0.242-1.868 0-3.457 1.194-4.045 2.861l-0.009 0.030c-0.133 0.427-0.21 0.918-0.21 1.426 0 0.206 0.013 0.41 0.037 0.61l-0.002-0.024c0.332 2.046 2.086 3.59 4.201 3.59 0.061 0 0.121-0.001 0.181-0.004l-0.009 0c1.463-0.044 2.733-0.831 3.451-1.994l0.010-0.018c0.267-0.372 0.45-0.822 0.511-1.311l0.001-0.014c0.125-2.237 0.075-4.461 0.087-6.698 0.012-5.036-0.012-10.060 0.025-15.083z"></path>
					</svg>
                    <span class="max-w-0 inline-block font-bold tracking-widest uppercase transition-all duration-300 ease-out overflow-hidden group-hover:max-w-xs whitespace-nowrap text-[10px]">
                        CRXZY
                    </span>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-6 bg-zinc-950">
            <div class="mb-6 border-b border-zinc-800 pb-3">
                <h2 id="sectionTitle" class="text-sm font-bold text-white tracking-widest uppercase">TRENDING NOW</h2>
            </div>
            <div id="videoGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">
                <div class="text-zinc-600 text-xs font-mono py-12 col-span-full text-center tracking-widest animate-pulse">
                    LOADING DATA PACKETS...
                </div>
            </div>
            <div id="scrollTrigger" class="h-10 w-full flex items-center justify-center mt-6 text-[11px] text-zinc-600 font-mono tracking-wider uppercase">
                </div>
        </main>
    </div>
    <div id="playerModal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-5xl rounded-none overflow-hidden shadow-2xl relative border border-zinc-800">
            <div class="bg-zinc-900 px-4 py-2 flex items-center justify-between border-b border-zinc-800 font-mono text-xs">
                <h3 id="modalVideoTitle" class="text-xs font-bold text-zinc-300 tracking-widest uppercase truncate pr-6">LOADING...</h3>
                <button id="closeModalBtn" class="text-zinc-400 hover:text-white bg-zinc-800 hover:bg-zinc-700 px-3 py-1 text-xs font-bold border border-zinc-700 transition cursor-pointer">
                    X
                </button>
            </div>
            <div class="relative aspect-video bg-black">
                <iframe id="apiIframe" class="absolute inset-0 w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
